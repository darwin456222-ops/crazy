<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Angry Pets: Pure Edition</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: #0a0a20; overflow: hidden; font-family: sans-serif; color: white; touch-action: none; }
        
        #ui { position: fixed; top: 0; width: 100%; height: 60px; background: rgba(0,0,0,0.9); display: flex; align-items: center; justify-content: space-around; z-index: 1000; border-bottom: 3px solid #00ffcc; }
        
        .main-container { padding: 70px 10px 110px; display: flex; flex-direction: column; align-items: center; height: 100vh; overflow-y: auto; }

        .btn-group { display: flex; gap: 8px; width: 95%; margin-bottom: 15px; }
        #open-shop-btn { flex: 3; background: #9c27b0; color: white; border: 2px solid #fff; padding: 12px; border-radius: 12px; font-weight: bold; }
        #reset-btn { flex: 1; background: #444; color: #ccc; border: 1px solid #666; border-radius: 12px; font-size: 10px; font-weight: bold; }

        #hotel { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; width: 95vw; padding-bottom: 30px; }
        .room { position: relative; background: #1a1a30; border: 3px solid #333; border-radius: 15px; height: 120px; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: 0.2s; }
        .room.locked { background: #050510; border-style: dashed; opacity: 0.5; }
        .room.active { border-color: #00ffcc; }
        .room.danger { animation: shake 0.1s infinite; border-color: #ff0055; }

        /* Resimlerin APK içinde düzgün durması için */
        .pet-img { width: 60px; height: 60px; border-radius: 8px; object-fit: cover; pointer-events: none; }
        
        .bubble { position: absolute; top: -12px; right: -12px; width: 45px; height: 45px; background: white; border-radius: 50%; display: none; align-items: center; justify-content: center; font-size: 28px; border: 4px solid #00d2ff; z-index: 100; animation: bounce 0.5s infinite; }
        
        #shop-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 3000; display: none; flex-direction: column; align-items: center; justify-content: center; }

        #inventory { position: fixed; bottom: 0; width: 100%; height: 85px; background: #111; display: flex; align-items: center; justify-content: center; gap: 10px; border-top: 3px solid #333; z-index: 1000; }
        .tool { width: 55px; height: 55px; background: #222; border: 3px solid #444; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 26px; }
        .tool.selected { border-color: #00ffcc; background: #003322; transform: scale(1.1); }

        @keyframes shake { 0% { transform: translate(2px, 1px); } 50% { transform: translate(-2px, -1px); } 100% { transform: translate(0); } }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }
    </style>
</head>
<body>

<div id="ui">
    <div>💰 <span id="money">0</span></div>
    <div>🏨 <span id="pet-count">0</span>/12</div>
</div>

<div class="main-container">
    <div class="btn-group">
        <button id="open-shop-btn" onclick="toggleShop(true)">🛒 ODA SATIN AL (100 TL)</button>
        <button id="reset-btn" onclick="resetGame()">SIFIRLA</button>
    </div>
    <div id="hotel"></div>
</div>

<div id="shop-overlay">
    <div style="background:#222; padding:30px; border-radius:20px; width:85%; text-align:center; border: 2px solid #9c27b0;">
        <h2 style="color:#ff9800; margin-bottom:20px;">DÜKKAN</h2>
        <button onclick="buyRoom()" style="background:#2e7d32; color:white; width:100%; padding:15px; border:none; border-radius:10px; font-weight:bold;">YENİ ODA AÇ (100 TL)</button>
        <button onclick="toggleShop(false)" style="margin-top:20px; background:#444; color:white; width:100%; padding:10px; border:none; border-radius:10px;">GERİ DÖ</button>
    </div>
</div>

<div id="inventory">
    <div class="tool selected" onclick="selectTool('⏰', this)">⏰</div>
    <div class="tool" onclick="selectTool('🍔', this)">🍔</div>
    <div class="tool" onclick="selectTool('🎾', this)">🎾</div>
    <div class="tool" onclick="selectTool('💦', this)">💦</div>
</div>

<script>
    const rawUrl = "https://raw.githubusercontent.com/darwin456222-ops/Darwiizl/main/";
    const allNeeds = ["⏰", "🍔", "🎾", "💦"];
    let money = 0;
    let selectedTool = "⏰";
    let usedPets = [];
    let rooms = [];

    // Mimi ve Coco Çıkarıldı -> Browny ve Stary Eklendi
    const petTypes = [
        { name: "Squeak", img: "squeak.jpg" }, { name: "Gus", img: "gus.jpg" },
        { name: "Blinky", img: "blinky.jpg" }, { name: "Flip", img: "flip.jpg" },
        { name: "Sugar", img: "sugar.jpg" }, { name: "Dot", img: "dot.jpg" },
        { name: "Sunny", img: "sunny.jpg" }, { name: "Sleapy", img: "sleapy.jpg" },
        { name: "Pinky", img: "pinky.jpg" }, { name: "Dinory", img: "dinory.jpg" },
        { name: "Browny", img: "browny.jpg" }, { name: "Stary", img: "stary.jpg" }
    ];

    function saveGame() {
        const data = { money, usedPets, rooms: rooms.map(r => ({ locked: r.locked, occupied: r.occupied, pet: r.pet })) };
        localStorage.setItem('angryPets_v2', JSON.stringify(data));
    }

    function loadGame() {
        const saved = localStorage.getItem('angryPets_v2');
        if (saved) {
            const data = JSON.parse(saved);
            money = data.money;
            usedPets = data.usedPets;
            rooms = data.rooms.map(r => ({ ...r, needActive: false, currentNeed: "", timer: 100 }));
        } else {
            rooms = Array(12).fill(null).map((_, i) => ({
                locked: i >= 6, occupied: false, pet: null, needActive: false, currentNeed: "", timer: 100
            }));
        }
    }

    function resetGame() {
        if(confirm("Tüm ilerleme silinsin mi?")) {
            localStorage.removeItem('angryPets_v2');
            location.reload();
        }
    }

    function toggleShop(s) { document.getElementById('shop-overlay').style.display = s ? 'flex' : 'none'; }

    function buyRoom() {
        const idx = rooms.findIndex(r => r.locked);
        if (idx !== -1 && money >= 100) {
            money -= 100;
            rooms[idx].locked = false;
            saveGame(); updateUI(); updateHotel(); toggleShop(false);
        } else { alert("Para yetersiz veya tüm odalar açık!"); }
    }

    function updateHotel() {
        const hotel = document.getElementById('hotel');
        hotel.innerHTML = '';
        rooms.forEach((room, i) => {
            const div = document.createElement('div');
            div.onclick = () => useTool(i);
            if (room.locked) {
                div.className = 'room locked';
                div.innerHTML = `<span>🔒</span>`;
            } else if (!room.occupied) {
                div.className = 'room';
                div.innerHTML = `<span style="font-size:10px; color:#555;">BOŞ</span>`;
            } else {
                div.className = `room occupied ${room.needActive ? (room.timer < 35 ? 'danger' : 'active') : ''}`;
                div.innerHTML = `
                    <div class="bubble" style="display:${room.needActive?'flex':'none'}">${room.currentNeed}</div>
                    <img class="pet-img" src="${rawUrl + room.pet.img}" onerror="this.style.display='none'">
                    <div style="font-size:10px; margin-top:5px;">${room.pet.name}</div>
                `;
            }
            hotel.appendChild(div);
        });
    }

    function checkIn() {
        const empty = rooms.findIndex(r => !r.locked && !r.occupied);
        if (empty !== -1 && usedPets.length < 12) {
            const avail = petTypes.filter(p => !usedPets.includes(p.name));
            if (avail.length > 0) {
                const p = avail[Math.floor(Math.random() * avail.length)];
                rooms[empty].occupied = true; rooms[empty].pet = p;
                usedPets.push(p.name);
                saveGame(); updateUI(); updateHotel();
            }
        }
    }

    function useTool(i) {
        const r = rooms[i];
        if (r && r.occupied && r.needActive && selectedTool === r.currentNeed) {
            r.needActive = false; money += 2;
            saveGame(); updateUI(); updateHotel();
        }
    }

    function selectTool(t, el) {
        selectedTool = t;
        document.querySelectorAll('.tool').forEach(x => x.classList.remove('selected'));
        el.classList.add('selected');
    }

    function updateUI() {
        document.getElementById('money').innerText = money;
        document.getElementById('pet-count').innerText = usedPets.length;
    }

    setInterval(() => {
        rooms.forEach(r => {
            if (r.occupied) {
                if (!r.needActive && Math.random() > 0.98) {
                    r.needActive = true;
                    r.currentNeed = allNeeds[Math.floor(Math.random() * allNeeds.length)];
                    r.timer = 100;
                }
                if (r.needActive) {
                    r.timer -= 1.0;
                    if (r.timer <= 0) { r.needActive = false; r.timer = 100; }
                }
            }
        });
        updateHotel();
    }, 400);

    window.onload = () => {
        loadGame(); updateUI(); updateHotel();
        setInterval(checkIn, 6000);
    };
</script>
</body>
</html>
